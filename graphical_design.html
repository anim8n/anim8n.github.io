<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOON - Graphical Design</title>
    <style>
        body {
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0;
        }
        h1 {
            text-align: center;
            color: #fff;
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 2px;
            margin: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #fff;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0;
            background-color: transparent;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #fff;
        }
        button {
            background-color: transparent;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 0;
            cursor: pointer;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
            font-family: inherit;
        }
        button:hover {
            opacity: 0.7;
        }
        .header {
            display: flex;
            align-items: center;
            margin: 10px 60px 10px;
            padding: 0;
            border-bottom: none;
            height: 60px;
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
        }
        
        .header * {
            font-family: inherit;
        }
        
        .nav-container {
            display: flex;
            gap: 30px;
            align-items: center;
            margin-left: auto;
            margin-right: 20px;
        }
        
        .nav-item {
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            transition: color 0.3s ease, background-color 0.3s ease;
        }
        
        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #a6a4ff;
        }
        
        .project-item {
            position: relative;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            transition: color 0.3s ease, background-color 0.3s ease;
            color: #fff;
        }
        
        .project-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #a6a4ff;
        }
        
        .project-dropdown {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 0;
            padding: 8px 0;
            min-width: 180px;
            display: none;
            box-shadow: none;
            z-index: 1000;
        }
        
        .project-item:hover .project-dropdown {
            display: block;
        }
        
        .dropdown-item {
            padding: 8px 16px;
            color: #fff;
            cursor: pointer;
            transition: color 0.3s ease, background-color 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        
        .dropdown-item:hover {
            background-color: rgba(255, 255, 255, 0.2);
            color: #a6a4ff;
        }
        
        .search-container {
            display: flex;
            gap: 0;
        }
        
        #searchInput {
            padding: 6px 10px;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0;
            font-size: 14px;
            width: 220px;
            background-color: transparent;
            color: #fff;
            transition: border-color 0.3s ease;
        }
        
        #searchInput:focus {
            outline: none;
            border-color: #fff;
        }
        
        #searchBtn {
            padding: 6px 14px;
            background-color: transparent;
            color: #fff;
            border: none;
            border-radius: 0;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        
        #searchBtn:hover {
            opacity: 0.7;
        }
        
        /* 底部信息区域样式 */
        .footer {
            background-color: #4d4d4d;
            color: #fff;
            padding: 40px 60px;
            margin-top: 60px;
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
        }
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .footer-left {
            text-align: left;
            font-size: 14px;
            color: #adadad;
        }
        .footer-right {
            display: flex;
            gap: 15px;
        }
        .footer-right a {
            display: inline-block;
            margin-left: 10px;
            transition: opacity 0.3s ease;
        }
        .footer-right a:hover {
            opacity: 0.7;
        }
        .footer-right img {
            width: 20px;
            height: 20px;
        }
        
        /* Graphical Design页面特有样式 */
        .graphical-design-container {
            margin: 20px 60px;
            text-align: center;
        }
        
        /* 加载状态样式 */
        .loading {
            display: block;
            text-align: center;
            color: #fff;
            font-size: 16px;
            padding: 20px;
        }
        
        /* 错误信息样式 */
        .error {
            text-align: center;
            color: #ff4444;
            font-size: 16px;
            padding: 20px;
        }
        
        /* 作品容器样式 */
        .works-container {
            margin: 20px 60px;
        }
        
        /* Graphical Design作品展示网格布局 */
        .graphical-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 8px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .grid-item {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .grid-item.placeholder::before {
            content: attr(data-size);
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .grid-item.title {
            background-color: rgba(255, 255, 255, 0.08);
            justify-content: flex-start;
            padding-left: 20px;
        }
        
        .grid-item.title .work-title {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 2px solid #fff;
            padding-bottom: 5px;
        }
        
        /* 网格布局定义 */
        .item-1 { grid-column: span 4; grid-row: span 1; height: 150px; }   /* 标题区域 */
        .item-2 { grid-column: span 3; grid-row: span 1; height: 150px; }   /* 435 x 233 */
        .item-3 { grid-column: span 5; grid-row: span 3; height: auto; }    /* 高737 */
        .item-4 { grid-column: span 3; grid-row: span 1; height: 150px; }   /* 435 x 233 */
        .item-5 { grid-column: span 1.5; grid-row: span 1; height: 150px; } /* 214 x 233 */
        .item-6 { grid-column: span 1.5; grid-row: span 1; height: 150px; } /* 214 x 233 */
        .item-7 { grid-column: span 3; grid-row: span 2; height: 308px; }   /* 435 x 485 */
        .item-8 { grid-column: span 3; grid-row: span 1; height: 150px; }   /* 438 x 233 */
        .item-9 { grid-column: span 3; grid-row: span 1; height: 150px; }   /* 438 x 233 */
        .item-10 { grid-column: span 1.5; grid-row: span 1; height: 150px; } /* 214 x 233 */
        .item-11 { grid-column: span 1.5; grid-row: span 1; height: 150px; } /* 214 x 233 */
    </style>
    <!-- 引入Token Manager -->
    <script src="token-manager.js"></script>
</head>

    <script>
        // 使用GitHub Git Trees API获取仓库结构
        async function fetchRepoStructure(owner, repo, token) {
            try {
                const defaultBranch = 'main';
                const treeUrl = `https://api.github.com/repos/${owner}/${repo}/git/trees/${defaultBranch}?recursive=1`;
                const treeResponse = await fetch(treeUrl, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!treeResponse.ok) {
                    const errorText = await treeResponse.text();
                    throw new Error(`获取仓库结构失败: ${treeResponse.status} ${treeResponse.statusText} - ${errorText}`);
                }

                const treeData = await treeResponse.json();
                return treeData;
            } catch (error) {
                console.error('获取仓库结构时出错:', error);
                throw error;
            }
        }

        // 创建Graphical Design网格布局
        async function createGraphicalDesignGrid(works) {
            const container = document.createElement('div');
            container.style.cssText = `
                display: flex;
                flex-direction: column;
                gap: 40px;
                padding: 20px;
            `;
            
            for (const work of works) {
                const gridWrapper = document.createElement('div');
                gridWrapper.className = 'graphical-grid';
                
                // 网格布局定义（根据用户提供的布局图）
                // 网格配置: [网格项类名, 尺寸标注, 是否为标题]
                const gridConfig = [
                    { className: 'item-1', size: 'Title', isTitle: true },
                    { className: 'item-2', size: '435 x 233', isTitle: false },
                    { className: 'item-3', size: '435 x 737', isTitle: false },
                    { className: 'item-4', size: '435 x 233', isTitle: false },
                    { className: 'item-5', size: '214 x 233', isTitle: false },
                    { className: 'item-6', size: '214 x 233', isTitle: false },
                    { className: 'item-7', size: '435 x 485', isTitle: false },
                    { className: 'item-8', size: '438 x 233', isTitle: false },
                    { className: 'item-9', size: '438 x 233', isTitle: false },
                    { className: 'item-10', size: '214 x 233', isTitle: false },
                    { className: 'item-11', size: '214 x 233', isTitle: false },
                ];
                
                // 收集所有可用图片（封面图 + 画廊图片）
                const allImages = [];
                if (work.coverUrl && work.coverUrl !== 'img_not_found.png') {
                    allImages.push(work.coverUrl);
                }
                work.galleryImages.forEach(img => {
                    allImages.push(img.url);
                });
                
                let imageIndex = 0;
                
                for (let i = 0; i < gridConfig.length; i++) {
                    const config = gridConfig[i];
                    const gridItem = document.createElement('div');
                    gridItem.className = `grid-item ${config.className}`;
                    
                    if (config.isTitle) {
                        // 标题区域
                        gridItem.classList.add('title');
                        const titleDiv = document.createElement('div');
                        titleDiv.className = 'work-title';
                        titleDiv.textContent = work.title || 'Untitled';
                        gridItem.appendChild(titleDiv);
                    } else {
                        // 图片区域
                        const imgSrc = allImages[imageIndex] || null;
                        
                        if (imgSrc) {
                            // 如果有图片，创建img元素
                            const img = document.createElement('img');
                            img.src = imgSrc;
                            img.alt = `${work.title || 'Work'} - ${config.size}`;
                            img.onload = () => {
                                gridItem.classList.remove('placeholder');
                            };
                            img.onerror = () => {
                                // 图片加载失败时显示占位符
                                gridItem.classList.add('placeholder');
                                gridItem.setAttribute('data-size', config.size);
                            };
                            gridItem.appendChild(img);
                            imageIndex++;
                        } else {
                            // 没有图片时显示占位符
                            gridItem.classList.add('placeholder');
                            gridItem.setAttribute('data-size', config.size);
                        }
                    }
                    
                    gridWrapper.appendChild(gridItem);
                }
                
                container.appendChild(gridWrapper);
            }
            
            return container;
        }

        // 获取文本文件内容
        async function fetchTextFile(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`获取文件失败: ${response.status} ${response.statusText}`);
                }
                return await response.text();
            } catch (error) {
                console.error('获取文本文件时出错:', error);
                return '';
            }
        }

        // 在页面加载时自动获取仓库结构
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const loadingElement = document.getElementById('loading');
                const errorElement = document.getElementById('error');
                const worksContainer = document.getElementById('worksContainer');
                
                loadingElement.style.display = 'block';
                errorElement.textContent = '';
                
                const owner = 'anim8n';
                const repo = 'portfolio';
                const token = getGitHubToken();
                
                const repoData = await fetchRepoStructure(owner, repo, token);
                
                const graphicalDesignFolder = repoData.tree.find(item => item.path === 'graphical design' && item.type === 'tree');
                if (!graphicalDesignFolder) {
                    throw new Error('未找到graphical design文件夹');
                }
                
                const graphicalDesignSubfolders = repoData.tree
                    .filter(item => item.path.startsWith('graphical design/') && item.path.split('/').length === 2 && item.type === 'tree')
                    .map(item => item.path);
                
                console.log('找到的作品子文件夹:', graphicalDesignSubfolders);
                
                const works = [];
                for (const folder of graphicalDesignSubfolders) {
                    const work = {
                        folder: folder,
                        title: '',
                        description: '',
                        coverUrl: null,
                        galleryImages: []  // 用于存储imgs文件夹中的展示图片
                    };
                    
                    const titleFile = repoData.tree.find(item => item.path === `${folder}/title.txt` && item.type === 'blob');
                    if (titleFile) {
                        const titleUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/${folder}/title.txt`;
                        work.title = await fetchTextFile(titleUrl);
                    }
                    
                    const descFile = repoData.tree.find(item => item.path === `${folder}/description.txt` && item.type === 'blob');
                    if (descFile) {
                        const descUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/${folder}/description.txt`;
                        work.description = await fetchTextFile(descUrl);
                    }
                    
                    // 查找根目录下的封面图
                    const rootImageFiles = repoData.tree.filter(item => 
                        item.path.startsWith(`${folder}/`) && 
                        item.type === 'blob' && 
                        (item.path.endsWith('.jpg') || item.path.endsWith('.jpeg') || item.path.endsWith('.png')) &&
                        !item.path.includes('/imgs/')
                    );
                    
                    console.log(`文件夹 ${folder} 根目录中的图片文件:`, rootImageFiles);
                    
                    if (rootImageFiles.length > 0) {
                        work.coverUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/${rootImageFiles[0].path}`;
                        console.log(`为作品 ${folder} 设置封面图片URL:`, work.coverUrl);
                    } else {
                        work.coverUrl = 'img_not_found.png';
                        console.log(`文件夹 ${folder} 没有找到根目录图片，使用默认图片`);
                    }
                    
                    // 查找imgs文件夹中的展示图片
                    const galleryImageFiles = repoData.tree.filter(item => 
                        item.path.startsWith(`${folder}/imgs/`) && 
                        item.type === 'blob' && 
                        (item.path.endsWith('.jpg') || item.path.endsWith('.jpeg') || item.path.endsWith('.png'))
                    );
                    
                    console.log(`文件夹 ${folder}/imgs/ 中的展示图片:`, galleryImageFiles);
                    
                    work.galleryImages = galleryImageFiles.map(img => ({
                        url: `https://raw.githubusercontent.com/${owner}/${repo}/main/${img.path}`,
                        name: img.path.split('/').pop()
                    }));
                    
                    works.push(work);
                }
                
                console.log('最终作品列表:', works);
                
                // 创建作品网格展示
                const worksList = await createGraphicalDesignGrid(works);
                worksContainer.appendChild(worksList);
                
            } catch (error) {
                console.error('获取作品列表时出错:', error);
                const errorElement = document.getElementById('error');
                errorElement.textContent = `加载作品列表失败: ${error.message}`;
            } finally {
                const loadingElement = document.getElementById('loading');
                loadingElement.style.display = 'none';
            }
        });
    </script>
