    <style>
        body {
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0;
        }
        h1 {
            text-align: center;
            color: #fff;
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 2px;
            margin: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #fff;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0;
            background-color: transparent;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #fff;
        }
        button {
            background-color: transparent;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 0;
            cursor: pointer;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
            font-family: inherit;
        }
        button:hover {
            opacity: 0.7;
        }
        .header {
            display: flex;
            align-items: center;
            margin: 10px 60px 10px;
            padding: 0;
            border-bottom: none;
            height: 60px;
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
        }
        
        .header * {
            font-family: inherit;
        }
        
        .nav-container {
            display: flex;
            gap: 30px;
            align-items: center;
            margin-left: auto;
            margin-right: 20px;
        }
        
        .nav-item {
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            transition: color 0.3s ease, background-color 0.3s ease;
        }
        
        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #a6a4ff;
        }
        
        .project-item {
            position: relative;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            transition: color 0.3s ease, background-color 0.3s ease;
            color: #fff;
        }
        
        .project-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #a6a4ff;
        }
        
        .project-dropdown {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 0;
            padding: 8px 0;
            min-width: 180px;
            display: none;
            box-shadow: none;
            z-index: 1000;
        }
        
        .project-item:hover .project-dropdown {
            display: block;
        }
        
        .dropdown-item {
            padding: 8px 16px;
            color: #fff;
            cursor: pointer;
            transition: color 0.3s ease, background-color 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        
        .dropdown-item:hover {
            background-color: rgba(255, 255, 255, 0.2);
            color: #a6a4ff;
        }
        
        .search-container {
            display: flex;
            gap: 0;
        }
        
        #searchInput {
            padding: 6px 10px;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0;
            font-size: 14px;
            width: 220px;
            background-color: transparent;
            color: #fff;
            transition: border-color 0.3s ease;
        }
        
        #searchInput:focus {
            outline: none;
            border-color: #fff;
        }
        
        #searchBtn {
            padding: 6px 14px;
            background-color: transparent;
            color: #fff;
            border: none;
            border-radius: 0;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        
        #searchBtn:hover {
            opacity: 0.7;
        }
        
        /* 底部信息区域样式 */
        .footer {
            background-color: #4d4d4d;
            color: #fff;
            padding: 40px 60px;
            margin-top: 60px;
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
        }
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .footer-left {
            text-align: left;
            font-size: 14px;
            color: #adadad;
        }
        .footer-right {
            display: flex;
            gap: 15px;
        }
        .footer-right a {
            display: inline-block;
            margin-left: 10px;
            transition: opacity 0.3s ease;
        }
        .footer-right a:hover {
            opacity: 0.7;
        }
        .footer-right img {
            width: 20px;
            height: 20px;
        }
        
        /* Graphical Design页面特有样式 */
        .graphical-design-container {
            margin: 20px 60px;
            text-align: center;
        }
        
        /* 加载状态样式 */
        .loading {
            display: block;
            text-align: center;
            color: #fff;
            font-size: 16px;
            padding: 20px;
        }
        
        /* 错误信息样式 */
        .error {
            text-align: center;
            color: #ff4444;
            font-size: 16px;
            padding: 20px;
        }
        
        /* 作品容器样式 */
        .works-container {
            margin: 20px 60px;
        }
        
        /* Graphical Design作品展示网格布局 - 占满屏幕宽度，5列布局 */
        .graphical-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5vw;
            padding: 1vw;
            width: calc(100% - 2vw);
            max-width: none;
            margin: 0 auto;
        }
        
        .grid-item {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: fill;  /* 强制拉伸填满整个区域 */
        }
        
        .grid-item.placeholder::before {
            content: attr(data-size);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8vw;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        /* 图片标题覆盖层 */
        .grid-item.has-title {
            justify-content: flex-start;
        }
        
        .image-title-overlay {
            position: absolute;
            top: 0.8vw;
            left: 1vw;
            color: #fff;
            font-size: 1.5vw;
            font-weight: bold;
            border-bottom: 2px solid #fff;
            padding-bottom: 0.3vw;
            z-index: 10;
            background-color: transparent;
            text-shadow: none;
        }
        
        /* 网格布局定义 - 严格匹配设计图 */
        /* 第一列（左边）*/
        .item-1 { grid-column: 1; grid-row: 1; height: 12vw; }              /* 第1张图：左上角，485 x 233，带标题 */
        .item-2 { grid-column: 1; grid-row: 2; height: 12vw; }              /* 第2张图：第二行左边，435 x 233 */
        .item-3 { grid-column: 1; grid-row: 3; grid-row-end: 5; height: 25vw; } /* 第3张图：第三/四行左边（跨2行），435 x 485 */
        
        /* 第二、三列（中间）*/
        .item-4 { grid-column: 2; grid-column-end: 4; grid-row: 1; height: 12vw; } /* 第4张图：第一行中间（跨列2-3），435 x 233 */
        .item-5 { grid-column: 2; grid-row: 2; height: 12vw; }              /* 第5张图：第二行中间左，214 x 233 */
        .item-6 { grid-column: 3; grid-row: 2; height: 12vw; }              /* 第6张图：第二行中间右，214 x 233 */
        .item-7 { grid-column: 2; grid-column-end: 4; grid-row: 3; height: 12vw; } /* 第7张图：第三行中间（跨列2-3），438 x 233 */
        .item-8 { grid-column: 2; grid-column-end: 4; grid-row: 4; height: 12vw; } /* 第8张图：第四行中间（跨列2-3），438 x 233 */
        
        /* 第四、五列（右边）*/
        .item-9 { grid-column: 4; grid-column-end: 6; grid-row: 1; grid-row-end: 4; height: 37vw; } /* 第9张图：最右边高图（跨列4-5，跨行1-3），435 x 737 */
        .item-10 { grid-column: 4; grid-row: 4; height: 12vw; }             /* 第10张图：第四行右边左，214 x 233 */
        .item-11 { grid-column: 5; grid-row: 4; height: 12vw; }             /* 第11张图：第四行右边右，214 x 233 */
    </style>

    <script>
        // 使用GitHub Git Trees API获取仓库结构
        async function fetchRepoStructure(owner, repo, token) {
            try {
                const defaultBranch = 'main';
                const treeUrl = `https://api.github.com/repos/${owner}/${repo}/git/trees/${defaultBranch}?recursive=1`;
                const treeResponse = await fetch(treeUrl, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!treeResponse.ok) {
                    const errorText = await treeResponse.text();
                    throw new Error(`获取仓库结构失败: ${treeResponse.status} ${treeResponse.statusText} - ${errorText}`);
                }

                const treeData = await treeResponse.json();
                return treeData;
            } catch (error) {
                console.error('获取仓库结构时出错:', error);
                throw error;
            }
        }

        // 创建Graphical Design网格布局
        async function createGraphicalDesignGrid(works) {
            const container = document.createElement('div');
            container.style.cssText = `
                display: flex;
                flex-direction: column;
                gap: 40px;
                padding: 20px;
            `;
            
            for (const work of works) {
                const gridWrapper = document.createElement('div');
                gridWrapper.className = 'graphical-grid';
                
                // 网格布局定义（根据设计图）- 总共11个图片位置
                // 网格配置: [网格项类名, 尺寸标注, 是否为第一张图(带标题)]
                const gridConfig = [
                    { className: 'item-1', size: '485 x 233', isFirst: true },   // 第1张图，左上角，带标题
                    { className: 'item-2', size: '435 x 233', isFirst: false }, // 第2张图，第二行左边
                    { className: 'item-3', size: '435 x 485', isFirst: false }, // 第3张图，第三/四行左边（跨2行）
                    { className: 'item-4', size: '435 x 233', isFirst: false }, // 第4张图，第一行中间
                    { className: 'item-5', size: '214 x 233', isFirst: false }, // 第5张图，第二行中间左
                    { className: 'item-6', size: '214 x 233', isFirst: false }, // 第6张图，第二行中间右
                    { className: 'item-7', size: '438 x 233', isFirst: false }, // 第7张图，第三行中间
                    { className: 'item-8', size: '438 x 233', isFirst: false }, // 第8张图，第四行中间
                    { className: 'item-9', size: '435 x 737', isFirst: false }, // 第9张图，最右边高图（跨3行）
                    { className: 'item-10', size: '214 x 233', isFirst: false }, // 第10张图，第四行右边左
                    { className: 'item-11', size: '214 x 233', isFirst: false }, // 第11张图，第四行右边右
                ];
                
                // 使用所有画廊图片（共11张）
                const allImages = work.galleryImages.map(img => img.url);
                
                let imageIndex = 0;
                
                for (let i = 0; i < gridConfig.length; i++) {
                    const config = gridConfig[i];
                    const gridItem = document.createElement('div');
                    gridItem.className = `grid-item ${config.className}`;
                    
                    // 图片区域
                    const imgSrc = allImages[imageIndex] || null;
                    
                    if (imgSrc) {
                        // 如果有图片，创建img元素
                        const img = document.createElement('img');
                        img.src = imgSrc;
                        img.alt = `${work.title || 'Work'} - ${config.size}`;
                        img.onload = () => {
                            gridItem.classList.remove('placeholder');
                        };
                        img.onerror = () => {
                            gridItem.classList.add('placeholder');
                            gridItem.setAttribute('data-size', config.size);
                        };
                        gridItem.appendChild(img);
                        
                        // 如果是第一张图，添加标题覆盖层
                        if (config.isFirst) {
                            console.log('添加标题覆盖层:', work.title || '无标题');
                            gridItem.classList.add('has-title');
                            const titleOverlay = document.createElement('div');
                            titleOverlay.className = 'image-title-overlay';
                            titleOverlay.textContent = work.title || 'Untitled';
                            gridItem.appendChild(titleOverlay);
                        }
                        
                        imageIndex++;
                    } else {
                        // 没有图片时显示占位符
                        gridItem.classList.add('placeholder');
                        gridItem.setAttribute('data-size', config.size);
                        
                        // 如果是第一张图，添加标题覆盖层
                        if (config.isFirst) {
                            console.log('添加标题覆盖层:', work.title || '无标题');
                            gridItem.classList.add('has-title');
                            const titleOverlay = document.createElement('div');
                            titleOverlay.className = 'image-title-overlay';
                            titleOverlay.textContent = work.title || 'Untitled';
                            gridItem.appendChild(titleOverlay);
                        }
                    }
                    
                    gridWrapper.appendChild(gridItem);
                }
                
                container.appendChild(gridWrapper);
            }
            
            return container;
        }

        // 获取文本文件内容
        async function fetchTextFile(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`获取文件失败: ${response.status} ${response.statusText}`);
                }
                return await response.text();
            } catch (error) {
                console.error('获取文本文件时出错:', error);
                return '';
            }
        }

        // 在页面加载时自动获取仓库结构
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const loadingElement = document.getElementById('loading');
                const errorElement = document.getElementById('error');
                const worksContainer = document.getElementById('worksContainer');
                
                loadingElement.style.display = 'block';
                errorElement.textContent = '';
                
                const owner = 'anim8n';
                const repo = 'portfolio';
                const token = getGitHubToken();
                
                const repoData = await fetchRepoStructure(owner, repo, token);
                
                const graphicalDesignFolder = repoData.tree.find(item => item.path === 'graphical design' && item.type === 'tree');
                if (!graphicalDesignFolder) {
                    throw new Error('未找到graphical design文件夹');
                }
                
                const graphicalDesignSubfolders = repoData.tree
                    .filter(item => item.path.startsWith('graphical design/') && item.type === 'tree' && item.path !== 'graphical design')
                    .map(item => item.path);
                
                console.log('找到的作品子文件夹:', graphicalDesignSubfolders);
                
                const works = [];
                for (const folder of graphicalDesignSubfolders) {
                    // 子文件夹名称就是作品标题
                    const title = folder.split('/').pop();
                    
                    const work = {
                        folder: folder,
                        title: title,  // 文件夹名称即为标题
                        description: '',
                        galleryImages: []  // 所有图片（共11张）
                    };
                    
                    // 查找子文件夹中的所有图片（png/jpg/jpeg格式）
                    const imageFiles = repoData.tree.filter(item => 
                        item.path.startsWith(`${folder}/`) && 
                        item.type === 'blob' && 
                        (item.path.endsWith('.jpg') || item.path.endsWith('.jpeg') || item.path.endsWith('.png'))
                    );
                    
                    console.log(`文件夹 ${folder}/ 中的图片:`, imageFiles);
                    
                    // 将图片按数字排序（确保 img1→img2→...→img11 的顺序）
                    const sortedImages = imageFiles.sort((a, b) => {
                        const nameA = a.path.split('/').pop().toLowerCase();
                        const nameB = b.path.split('/').pop().toLowerCase();
                        // 提取文件名中的数字进行排序
                        const numA = parseInt(nameA.match(/\d+/)) || 0;
                        const numB = parseInt(nameB.match(/\d+/)) || 0;
                        return numA - numB;
                    });
                    
                    work.galleryImages = sortedImages.map(img => ({
                        url: `https://raw.githubusercontent.com/${owner}/${repo}/main/${img.path}`,
                        name: img.path.split('/').pop()
                    }));
                    
                    console.log(`作品 ${title} 的图片列表:`, work.galleryImages);
                    
                    works.push(work);
                }
                
                console.log('最终作品列表:', works);
                
                // 创建作品网格展示
                const worksList = await createGraphicalDesignGrid(works);
                worksContainer.appendChild(worksList);
                
            } catch (error) {
                console.error('获取作品列表时出错:', error);
                const errorElement = document.getElementById('error');
                errorElement.textContent = `加载作品列表失败: ${error.message}`;
            } finally {
                const loadingElement = document.getElementById('loading');
                loadingElement.style.display = 'none';
            }
        });
    </script>
