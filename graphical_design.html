<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOON - Graphical Design</title>
    <link rel="stylesheet" href="fonts/fonts.css">
    <style>
        body {
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0;
        }
        h1 {
            text-align: center;
            color: #fff;
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 2px;
            margin: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #fff;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0;
            background-color: transparent;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #fff;
        }
        button {
            background-color: transparent;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 0;
            cursor: pointer;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
            font-family: inherit;
        }
        button:hover {
            opacity: 0.7;
        }
        .header {
            display: flex;
            align-items: center;
            margin: 10px 60px 10px;
            padding: 0;
            border-bottom: none;
            height: 60px;
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
        }
        
        .header * {
            font-family: inherit;
        }
        
        .nav-container {
            display: flex;
            gap: 30px;
            align-items: center;
            margin-left: auto;
            margin-right: 20px;
        }
        
        .nav-item {
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            transition: color 0.3s ease, background-color 0.3s ease;
        }
        
        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #a6a4ff;
        }
        
        .project-item {
            position: relative;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            transition: color 0.3s ease, background-color 0.3s ease;
            color: #fff;
        }
        
        .project-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #a6a4ff;
        }
        
        .project-dropdown {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 0;
            padding: 8px 0;
            min-width: 180px;
            display: none;
            box-shadow: none;
            z-index: 1000;
        }
        
        .project-item:hover .project-dropdown {
            display: block;
        }
        
        .dropdown-item {
            padding: 8px 16px;
            color: #fff;
            cursor: pointer;
            transition: color 0.3s ease, background-color 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .dropdown-item[hidden] {
            display: none !important;
        }
        
        .dropdown-item:hover {
            background-color: rgba(255, 255, 255, 0.2);
            color: #a6a4ff;
        }
        
        .search-container {
            display: flex;
            gap: 0;
        }
        
        #searchInput {
            padding: 6px 10px;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0;
            font-size: 14px;
            width: 220px;
            background-color: transparent;
            color: #fff;
            transition: border-color 0.3s ease;
        }
        
        #searchInput:focus {
            outline: none;
            border-color: #fff;
        }
        
        #searchBtn {
            padding: 6px 14px;
            background-color: transparent;
            color: #fff;
            border: none;
            border-radius: 0;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        
        #searchBtn:hover {
            opacity: 0.7;
        }
        
        /* 底部信息区域样式 */
        .footer {
            background-color: #4d4d4d;
            color: #fff;
            padding: 40px 60px;
            margin-top: 60px;
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
        }
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .footer-left {
            text-align: left;
            font-size: 14px;
            color: #adadad;
        }
        .footer-right {
            display: flex;
            gap: 15px;
        }
        .footer-right a {
            display: inline-block;
            margin-left: 10px;
            transition: opacity 0.3s ease;
        }
        .footer-right a:hover {
            opacity: 0.7;
        }
        .footer-right img {
            width: 20px;
            height: 20px;
        }
        
        /* 加载状态样式 */
        .loading {
            display: block;
            text-align: center;
            color: #fff;
            font-size: 16px;
            padding: 20px;
        }
        
        /* 错误信息样式 */
        .error {
            text-align: center;
            color: #ff4444;
            font-size: 16px;
            padding: 20px;
        }
        
        /* 7张封面按照参考图排列，宽度随视口变化。 */
        .works-container {
            width: 100%;
        }

        .graphical-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: clamp(8px, 1.15vw, 18px);
            width: min(90vw, 1340px);
            margin: 40px auto 0;
            align-items: start;
        }
        
        .grid-item {
            display: block;
            min-width: 0;
            color: inherit;
            text-decoration: none;
        }
        
        .grid-item img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .item-1 { grid-column: 1; grid-row: 1; }
        .item-2 { grid-column: 2; grid-row: 1; }
        .item-3 { grid-column: 3; grid-row: 1; }
        .item-4 { grid-column: 1; grid-row: 2; }
        .item-5 { grid-column: 2 / 4; grid-row: 2; }
        .item-6 { grid-column: 1 / 3; grid-row: 3; }
        .item-7 { grid-column: 3; grid-row: 3; }

        @media (max-width: 700px) {
            .graphical-grid {
                gap: 6px;
                width: calc(100vw - 24px);
                margin-top: 24px;
            }
        }
    </style>
    <!-- 引入Token Manager -->
    <script src="token-manager.js"></script>
</head>
<body>
    <div class="container">

            <a href="index.html" aria-label="HOME" style="display: flex; align-items: center; text-decoration: none;">

                    <span>PROJECTS</span>

    <script>
        // 使用GitHub Git Trees API获取仓库结构
        async function fetchRepoStructure(owner, repo, token) {
            try {
                const defaultBranch = 'main';
                const treeUrl = `https://api.github.com/repos/${owner}/${repo}/git/trees/${defaultBranch}?recursive=1`;
                const treeResponse = await fetch(treeUrl, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!treeResponse.ok) {
                    const errorText = await treeResponse.text();
                    throw new Error(`获取仓库结构失败: ${treeResponse.status} ${treeResponse.statusText} - ${errorText}`);
                }

                const treeData = await treeResponse.json();
                return treeData;
            } catch (error) {
                console.error('获取仓库结构时出错:', error);
                throw error;
            }
        }

        function createGraphicalDesignGrid(covers) {
            const grid = document.createElement('div');
            grid.className = 'graphical-grid';

            covers.forEach((cover, index) => {
                const item = document.createElement('a');
                item.className = `grid-item item-${index + 1}`;
                item.href = `graphical_design-detail.html?folder=${encodeURIComponent(cover.folder)}`;

                const image = document.createElement('img');
                image.src = cover.url;
                image.alt = `Graphical Design ${index + 1}`;
                image.decoding = 'async';
                item.appendChild(image);
                grid.appendChild(item);
            });

            return grid;
        }

        // 在页面加载时自动获取仓库结构
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const loadingElement = document.getElementById('loading');
                const errorElement = document.getElementById('error');
                const worksContainer = document.getElementById('worksContainer');
                
                loadingElement.style.display = 'block';
                errorElement.textContent = '';
                
                const owner = 'anim8n';
                const repo = 'portfolio';
                const token = getGitHubToken();
                
                const repoData = await fetchRepoStructure(owner, repo, token);
                
                const rootFolder = 'grphical_design';
                const supportedExtensions = ['jpg', 'png', 'jpeg'];
                const covers = Array.from({ length: 7 }, (_, index) => {
                    const folder = `${rootFolder}/${index + 1}`;
                    const coverFile = repoData.tree.find(item => {
                        if (item.type !== 'blob') return false;
                        const normalizedPath = item.path.toLowerCase();
                        return supportedExtensions.some(extension =>
                            normalizedPath === `${folder}/cover.${extension}`.toLowerCase()
                        );
                    });

                    if (!coverFile) {
                        throw new Error(`未找到 ${folder}/cover.jpg、cover.png 或 cover.jpeg`);
                    }

                    const encodedPath = coverFile.path.split('/').map(encodeURIComponent).join('/');
                    return {
                        folder,
                        url: `https://raw.githubusercontent.com/${owner}/${repo}/main/${encodedPath}`
                    };
                });

                worksContainer.appendChild(createGraphicalDesignGrid(covers));
                
            } catch (error) {
                console.error('获取作品列表时出错:', error);
                const errorElement = document.getElementById('error');
                errorElement.textContent = `加载作品列表失败: ${error.message}`;
            } finally {
                const loadingElement = document.getElementById('loading');
                loadingElement.style.display = 'none';
            }
        });
    </script>
