<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOON - GRAPHICAL DESIGN DETAIL</title>
    <link rel="stylesheet" href="fonts/fonts.css">
    <style>
        body {
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0;
        }

        .header {
            display: flex;
            align-items: center;
            margin: 10px 60px 10px;
            padding: 0;
            border-bottom: none;
            height: 60px;
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
        }

        .header * {
            font-family: inherit;
        }

        .nav-container {
            display: flex;
            gap: 30px;
            align-items: center;
            margin-left: auto;
            margin-right: 20px;
        }

        .nav-item {
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            transition: color 0.3s ease, background-color 0.3s ease;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #a6a4ff;
        }

        .project-item {
            position: relative;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            transition: color 0.3s ease, background-color 0.3s ease;
            color: #fff;
        }

        .project-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #a6a4ff;
        }

        .project-dropdown {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 0;
            padding: 8px 0;
            min-width: 180px;
            display: none;
            box-shadow: none;
            z-index: 1000;
        }

        .project-item:hover .project-dropdown {
            display: block;
        }

        .dropdown-item {
            padding: 8px 16px;
            color: #fff;
            cursor: pointer;
            transition: color 0.3s ease, background-color 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .dropdown-item[hidden] {
            display: none !important;
        }

        .dropdown-item:hover {
            background-color: rgba(255, 255, 255, 0.2);
            color: #a6a4ff;
        }

        .content {
            min-height: calc(100vh - 210px);
        }

        .footer {
            background-color: #4d4d4d;
            color: #fff;
            padding: 40px 60px;
            margin-top: 60px;
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-left {
            text-align: left;
            font-size: 14px;
            color: #adadad;
        }

        .footer-right {
            display: flex;
            gap: 15px;
        }

        .footer-right a {
            display: inline-block;
            margin-left: 10px;
            transition: opacity 0.3s ease;
        }

        .footer-right a:hover {
            opacity: 0.7;
        }

        .footer-right img {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" aria-label="HOME" style="display: flex; align-items: center; text-decoration: none;">
                <img src="logo.png" alt="Logo" style="height: 200px; width: auto; margin-left: -60px; cursor: pointer;">
            </a>
            <div class="nav-container">
                <a href="index.html" class="nav-item">HOME</a>
                <div class="project-item">
                    <span>PROJECTS</span>
                    <div class="project-dropdown">
                        <a href="feature_film.html" class="dropdown-item">FEATURE FILM</a>
                        <a href="AD.html" class="dropdown-item">AD</a>
                        <a href="graphical_design.html" class="dropdown-item">GRAPHICAL DESIGN</a>
                    </div>
                </div>
                <a href="about.html" class="nav-item">ABOUT</a>
                <a href="join-us.html" class="nav-item">JOIN US</a>
            </div>
        </div>

        <main class="content"></main>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-left">
                Join us&emsp;hello.animoon.studio@gmail.com
            </div>
            <div class="footer-right">
                <a href="https://www.linkedin.com/company/animoon" target="_blank" title="LinkedIn">
                    <img src="跳转图标/linkin.png" alt="LinkedIn">
                </a>
                <a href="https://www.xiaohongshu.com/user/profile/65f04c29000000000b032c4f?xsec_token=YBO9eicZW3j8axk0PtThG-eLzpA2nJZesUk_ysgyPGljs=&amp;xsec_source=app_share&amp;xhsshare=CopyLink&amp;shareRedId=ODtIMDdINkI2NzUyOTgwNjZFOTo2SDpP&amp;apptime=1768987162&amp;share_id=788a15547d1847ab933d7159de83d91b" target="_blank" title="小红书">
                    <img src="跳转图标/red note.png" alt="小红书">
                </a>
                <a href="https://vimeo.com/animoon" target="_blank" title="Vimeo">
                    <img src="跳转图标/v.png" alt="Vimeo">
                </a>
                <a href="https://www.instagram.com/studioanim8n?igsh=MTdvcDB1cmNnNW5mMg==" target="_blank" title="Instagram">
                    <img src="跳转图标/ins.png" alt="Instagram">
                </a>
            </div>
        </div>
    </footer>
</body>
</html>
