<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOON - GRAPHICAL DESIGN DETAIL</title>
    <link rel="stylesheet" href="fonts/fonts.css">
    <style>
        body {
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0;
        }

        .header {
            display: flex;
            align-items: center;
            margin: 10px 60px 10px;
            padding: 0;
            border-bottom: none;
            height: 60px;
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
        }

        .header * {
            font-family: inherit;
        }

        .nav-container {
            display: flex;
            gap: 30px;
            align-items: center;
            margin-left: auto;
            margin-right: 20px;
        }

        .nav-item {
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            transition: color 0.3s ease, background-color 0.3s ease;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #a6a4ff;
        }

        .project-item {
            position: relative;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            transition: color 0.3s ease, background-color 0.3s ease;
            color: #fff;
        }

        .project-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #a6a4ff;
        }

        .project-dropdown {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 0;
            padding: 8px 0;
            min-width: 180px;
            display: none;
            box-shadow: none;
            z-index: 1000;
        }

        .project-item:hover .project-dropdown {
            display: block;
        }

        .dropdown-item {
            padding: 8px 16px;
            color: #fff;
            cursor: pointer;
            transition: color 0.3s ease, background-color 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .dropdown-item[hidden] {
            display: none !important;
        }

        .dropdown-item:hover {
            background-color: rgba(255, 255, 255, 0.2);
            color: #a6a4ff;
        }

        .content {
            min-height: calc(100vh - 210px);
            box-sizing: border-box;
            padding: 40px 0 0;
        }

        .carousel {
            width: min(70vw, 760px);
            margin: 0 auto;
        }

        .carousel-stage {
            position: relative;
        }

        .carousel-viewport {
            width: 100%;
            aspect-ratio: 1;
            overflow: hidden;
            background-color: #222222;
        }

        .carousel-track {
            display: flex;
            width: 100%;
            height: 100%;
            transform: translateX(0);
            transition: transform 520ms cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform;
        }

        .carousel-slide {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
        }

        .work-info {
            padding: 40px 60px 0;
        }

        #work-title {
            margin: 0 0 20px;
            color: #a6a4ff;
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 2px;
        }

        #work-description {
            margin: 0;
            color: #818181;
            font-size: 16px;
            line-height: 1.6;
            text-align: justify;
            text-align-last: left;
            white-space: pre-line;
        }

        .more-section {
            padding: 40px 0;
        }

        .more-title {
            margin: 0 0 20px;
            padding: 0 60px;
            color: #a6a4ff;
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .more-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            background-color: #222222;
            padding: 20px 0;
        }

        .more-scroll {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 10px 0;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .more-scroll::-webkit-scrollbar {
            display: none;
        }

        .more-image {
            flex: 0 0 300px;
            width: 300px;
            height: 300px;
            display: block;
            object-fit: cover;
        }

        .more-arrow {
            position: absolute;
            top: 50%;
            z-index: 10;
            width: 50px;
            height: 50px;
            padding: 0;
            border: 0;
            border-radius: 50%;
            background-color: transparent;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 24px;
            cursor: pointer;
            transform: translateY(-50%);
            transition: background-color 0.3s ease;
        }

        .more-arrow:hover {
            background-color: rgba(0, 0, 0, 0.3);
        }

        .more-arrow.previous {
            left: 0;
        }

        .more-arrow.next {
            right: 0;
        }

        .loading,
        .error {
            margin: 0;
            color: #adadad;
            font-size: 14px;
            text-align: center;
        }

        .error {
            color: #fff;
        }

        @media (max-width: 820px) {
            .content {
                padding-top: 24px;
            }

            .carousel {
                width: min(92vw, 680px);
            }

            .work-info {
                padding: 32px 24px 0;
            }

            .more-title {
                padding: 0 24px;
            }

            .more-image {
                flex-basis: 240px;
                width: 240px;
                height: 240px;
            }

        }

        @media (prefers-reduced-motion: reduce) {
            .carousel-track {
                transition-duration: 0ms;
            }
        }

        .footer {
            background-color: #4d4d4d;
            color: #fff;
            padding: 40px 60px;
            margin-top: 60px;
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-left {
            text-align: left;
            font-size: 14px;
            color: #adadad;
        }

        .footer-right {
            display: flex;
            gap: 15px;
        }

        .footer-right a {
            display: inline-block;
            margin-left: 10px;
            transition: opacity 0.3s ease;
        }

        .footer-right a:hover {
            opacity: 0.7;
        }

        .footer-right img {
            width: 20px;
            height: 20px;
        }
    </style>
    <script src="token-manager.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" aria-label="HOME" style="display: flex; align-items: center; text-decoration: none;">
                <img src="logo.png" alt="Logo" style="height: 200px; width: auto; margin-left: -60px; cursor: pointer;">
            </a>
            <div class="nav-container">
                <a href="index.html" class="nav-item">HOME</a>
                <div class="project-item">
                    <span>PROJECTS</span>
                    <div class="project-dropdown">
                        <a href="feature_film.html" class="dropdown-item">FEATURE FILM</a>
                        <a href="AD.html" class="dropdown-item">AD</a>
                        <a href="graphical_design.html" class="dropdown-item">GRAPHICAL DESIGN</a>
                    </div>
                </div>
                <a href="about.html" class="nav-item">ABOUT</a>
                <a href="join-us.html" class="nav-item">JOIN US</a>
            </div>
        </div>

        <main class="content">
            <p id="loading" class="loading">LOADING...</p>
            <p id="error" class="error" hidden></p>
            <section id="carousel" class="carousel" aria-label="Graphical Design Gallery" hidden>
                <div class="carousel-stage">
                    <div id="carouselViewport" class="carousel-viewport">
                        <div id="carouselTrack" class="carousel-track"></div>
                    </div>
                </div>
            </section>
            <div id="workInfo" class="work-info" hidden>
                <h2 id="work-title"></h2>
                <p id="work-description"></p>
            </div>
            <section id="moreSection" class="more-section" hidden>
                <h3 class="more-title">More</h3>
                <div class="more-container">
                    <button id="morePreviousButton" class="more-arrow previous" type="button" aria-label="Previous images">&lt;</button>
                    <div id="moreScroll" class="more-scroll"></div>
                    <button id="moreNextButton" class="more-arrow next" type="button" aria-label="Next images">&gt;</button>
                </div>
            </section>
        </main>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-left">
                Join us&emsp;hello.animoon.studio@gmail.com
            </div>
            <div class="footer-right">
                <a href="https://www.linkedin.com/company/animoon" target="_blank" title="LinkedIn">
                    <img src="跳转图标/linkin.png" alt="LinkedIn">
                </a>
                <a href="https://www.xiaohongshu.com/user/profile/65f04c29000000000b032c4f?xsec_token=YBO9eicZW3j8axk0PtThG-eLzpA2nJZesUk_ysgyPGljs=&amp;xsec_source=app_share&amp;xhsshare=CopyLink&amp;shareRedId=ODtIMDdINkI2NzUyOTgwNjZFOTo2SDpP&amp;apptime=1768987162&amp;share_id=788a15547d1847ab933d7159de83d91b" target="_blank" title="小红书">

                </a>
                <a href="https://vimeo.com/animoon" target="_blank" title="Vimeo">
                    <img src="跳转图标/v.png" alt="Vimeo">
                </a>
                <a href="https://www.instagram.com/studioanim8n?igsh=MTdvcDB1cmNnNW5mMg==" target="_blank" title="Instagram">

                </a>
            </div>
        </div>
    </footer>

    <script>
        const owner = 'anim8n';
        const repo = 'portfolio';
        const supportedImagePattern = /\.(jpe?g|png|webp|gif|avif)$/i;

        async function fetchRepoStructure() {
            const token = getGitHubToken();
            const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/trees/main?recursive=1`, {
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (!response.ok) {
                throw new Error(`获取仓库结构失败: ${response.status} ${response.statusText}`);
            }

            return response.json();
        }

        function getCurrentFolder() {
            const folder = new URLSearchParams(window.location.search).get('folder');
            return /^graphical_design\/[1-7]$/.test(folder || '')
                ? folder
                : 'graphical_design/1';
        }

        function findMoreImages(repoData, folder) {
            const moreFolder = `${folder}/More/`;

            return repoData.tree
                .filter(item => {
                    if (item.type !== 'blob' || !item.path.startsWith(moreFolder)) return false;
                    const relativePath = item.path.slice(moreFolder.length);
                    return !relativePath.includes('/') && supportedImagePattern.test(relativePath);
                })
                .sort((a, b) => {
                    const nameA = a.path.slice(moreFolder.length);
                    const nameB = b.path.slice(moreFolder.length);
                    return nameA.localeCompare(nameB, undefined, {
                        numeric: true,
                        sensitivity: 'base'
                    });
                })
                .map(item => ({
                    name: item.path.slice(moreFolder.length),
                    url: `https://raw.githubusercontent.com/${owner}/${repo}/main/${item.path.split('/').map(encodeURIComponent).join('/')}`
                }));
        }

        async function fetchTextFile(path) {
            const encodedPath = path.split('/').map(encodeURIComponent).join('/');

            try {
                const response = await fetch(`https://raw.githubusercontent.com/${owner}/${repo}/main/${encodedPath}`);
                if (!response.ok) {
                    throw new Error(`获取文件失败: ${response.status} ${response.statusText}`);
                }
                return (await response.text()).trim();
            } catch (error) {
                console.error(`读取 ${path} 失败:`, error);
                return '';
            }
        }

        async function loadWorkInfo(repoData, folder) {
            const titlePath = `${folder}/title.txt`;
            const descriptionPath = `${folder}/description.txt`;
            const titleFile = repoData.tree.find(item => item.type === 'blob' && item.path === titlePath);
            const descriptionFile = repoData.tree.find(item => item.type === 'blob' && item.path === descriptionPath);

            const [titleText, descriptionText] = await Promise.all([
                titleFile ? fetchTextFile(titleFile.path) : Promise.resolve(''),
                descriptionFile ? fetchTextFile(descriptionFile.path) : Promise.resolve('')
            ]);

            const title = titleText || folder.split('/').pop();
            document.getElementById('work-title').textContent = title;
            document.getElementById('work-description').textContent = descriptionText;
            document.getElementById('workInfo').hidden = false;
            document.title = `MOON - ${title}`;
        }

        function initializeCarousel(images) {
            const carousel = document.getElementById('carousel');
            const track = document.getElementById('carouselTrack');
            let currentIndex = 0;

            function appendSlide(imageData, index, isClone = false) {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                if (isClone) slide.setAttribute('aria-hidden', 'true');

                const image = document.createElement('img');
                image.src = imageData.url;
                image.alt = imageData.name;
                image.decoding = 'async';
                if (index > 0) image.loading = 'lazy';

                slide.appendChild(image);
                track.appendChild(slide);
            }

            images.forEach((imageData, index) => appendSlide(imageData, index));
            if (images.length > 1) appendSlide(images[0], images.length, true);

            function updateCarousel(animate = true) {
                track.style.transition = animate
                    ? 'transform 520ms cubic-bezier(0.22, 1, 0.36, 1)'
                    : 'none';
                track.style.transform = `translateX(-${currentIndex * 100}%)`;
            }

            function advanceCarousel() {
                currentIndex += 1;
                updateCarousel();

                if (currentIndex === images.length) {
                    track.addEventListener('transitionend', () => {
                        currentIndex = 0;
                        updateCarousel(false);
                        void track.offsetWidth;
                    }, { once: true });
                }
            }

            carousel.hidden = false;
            updateCarousel(false);

            if (images.length > 1) {
                window.setInterval(advanceCarousel, 3500);
            }
        }

        function initializeMoreSection(images) {
            const section = document.getElementById('moreSection');
            const scrollContainer = document.getElementById('moreScroll');
            const previousButton = document.getElementById('morePreviousButton');
            const nextButton = document.getElementById('moreNextButton');

            images.forEach(imageData => {
                const image = document.createElement('img');
                image.className = 'more-image';
                image.src = imageData.url;
                image.alt = imageData.name;
                image.loading = 'lazy';
                image.decoding = 'async';
                scrollContainer.appendChild(image);
            });

            previousButton.addEventListener('click', () => {
                scrollContainer.scrollBy({ left: -320, behavior: 'smooth' });
            });

            nextButton.addEventListener('click', () => {
                scrollContainer.scrollBy({ left: 320, behavior: 'smooth' });
            });

            section.hidden = false;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');

            try {
                const folder = getCurrentFolder();
                const repoData = await fetchRepoStructure();
                const images = findMoreImages(repoData, folder);

                if (images.length === 0) {
                    throw new Error(`未找到 ${folder}/More 文件夹中的图片`);
                }

                await loadWorkInfo(repoData, folder);
                initializeCarousel(images);
                initializeMoreSection(images);
            } catch (loadError) {
                console.error('加载Graphical Design图片失败:', loadError);
                error.textContent = loadError.message;
                error.hidden = false;
            } finally {
                loading.hidden = true;
            }
        });
    </script>
</body>
