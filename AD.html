<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="fonts/fonts.css">
    <style>
        body {
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0;
        }
        h1 {
            text-align: center;
            color: #fff;
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 2px;
            margin: 0;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #fff;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0;
            background-color: transparent;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #fff;
        }
        
        button {
            background-color: transparent;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 0;
            cursor: pointer;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
            font-family: inherit; /* 继承父元素的字体 */
        }
        
        button:hover {
            opacity: 0.7;
        }
        
        .header {
            display: flex;
            align-items: center;
            margin: 10px 60px 10px;
            padding: 0;
            border-bottom: none;
            height: 60px; /* 高度增加20px */
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
        }

        .site-logo-link {
            display: flex;
            align-items: center;
            flex: 0 0 auto;
            text-decoration: none;
        }

        .site-logo {
            width: auto;
            height: 200px;
            margin-left: -60px;
            cursor: pointer;
        }
        
        .header * {
            font-family: inherit;
        }
        
        .nav-container {
            display: flex;
            gap: 30px;
            align-items: center;
            margin-left: auto;
            margin-right: 20px;
        }
        
        .nav-item {
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            transition: color 0.3s ease, background-color 0.3s ease;
            white-space: nowrap;
        }
        
        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #a6a4ff;
        }
        
        .project-item {
            position: relative;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            transition: color 0.3s ease, background-color 0.3s ease;
            color: #fff;
            white-space: nowrap;
        }
        
        .project-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #a6a4ff;
        }
        
        .project-dropdown {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 0;
            padding: 8px 0;
            min-width: 180px;
            display: none;
            box-shadow: none;
            z-index: 1000;
        }
        
        .project-item:hover .project-dropdown {
            display: block;
        }

        .project-item:focus-within .project-dropdown {
            display: block;
        }
        
        .dropdown-item {
            padding: 8px 16px;
            color: #fff;
            cursor: pointer;
            transition: color 0.3s ease, background-color 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .dropdown-item[hidden] {
            display: none !important;
        }
        
        .dropdown-item:hover {
            background-color: rgba(255, 255, 255, 0.2);
            color: #a6a4ff;
        }
        
        .search-container {
            display: flex;
            gap: 0;
        }
        
        #searchInput {
            padding: 6px 10px;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0;
            font-size: 14px;
            width: 220px;
            background-color: transparent;
            color: #fff;
            transition: border-color 0.3s ease;
        }
        
        #searchInput:focus {
            outline: none;
            border-color: #fff;
        }
        
        #searchBtn {
            padding: 6px 14px;
            background-color: transparent;
            color: #fff;
            border: none;
            border-radius: 0;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        
        #searchBtn:hover {
            opacity: 0.7;
        }
        
        .loading {
            display: inline-block;
            margin: 40px 60px;
            text-align: center;
            font-size: 16px;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .error {
            color: rgba(255, 255, 255, 0.7);
            margin: 40px 60px;
            text-align: center;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .ad-cover-container {
            display: flex;
            justify-content: center;
            width: 100%;
            margin: 20px auto;
            padding: 0 clamp(24px, 5vw, 60px);
            box-sizing: border-box;
        }

        .ad-cover-image {
            display: none;
            width: min(100%, 1600px);
            height: auto;
        }

        .ad-works-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: clamp(22px, 2.1vw, 30px);
            width: min(100%, 1431px);
            margin: 0 auto;
            padding: 20px clamp(24px, 4.2vw, 60px);
            box-sizing: border-box;
        }

        .ad-work-item {
            display: flex;
            min-width: 0;
            flex-direction: column;
            align-items: stretch;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        @media (hover: hover) {
            .ad-work-item:hover {
                transform: translateY(-5px);
            }
        }

        .ad-work-image {
            position: relative;
            width: 100%;
            aspect-ratio: 417 / 240;
            margin-bottom: 15px;
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .ad-work-image img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .ad-work-text {
            width: 100%;
            min-width: 0;
            line-height: 1.5;
        }

        .ad-work-title {
            margin-bottom: 8px;
            color: #a6a4ff;
            font-size: 16px;
            font-weight: 700;
            overflow-wrap: anywhere;
            cursor: pointer;
        }

        .ad-work-description {
            color: #818181;
            font-size: 14px;
            text-align: left;
            white-space: pre-line;
            overflow-wrap: anywhere;
        }
        
        /* 底部信息区域样式 */
        .footer {
            background-color: #4d4d4d;
            color: #fff;
            padding: 40px 60px;
            margin-top: 60px;
            font-family: "Source Han Sans SC", "思源黑体", "黑体", "SimHei", Arial, sans-serif;
        }
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .footer-left {
            display: grid;
            grid-template-columns: max-content max-content;
            column-gap: 12px;
            row-gap: 4px;
            text-align: left;
            font-size: 14px;
            color: #adadad;
        }
        .footer-label {
            color: #fff;
            font-weight: 700;
        }
        .footer-right {
            display: flex;
            gap: 15px;
        }
        .footer-right a {
            display: inline-block;
            margin-left: 10px;
            transition: opacity 0.3s ease;
        }
        .footer-right a:hover {
            opacity: 0.7;
        }
        .footer-right img {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 1100px) {
            .ad-works-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .header {
                margin-right: 24px;
                margin-left: 24px;
            }

            .nav-container {
                gap: 10px;
                margin-right: 0;
            }

            .nav-item,
            .project-item {
                padding: 7px 10px;
                font-size: 14px;
            }
        }

        @media (max-width: 680px) {
            .header {
                display: block;
                height: auto;
                min-height: 0;
                margin: 8px 16px 18px;
            }

            .site-logo-link {
                width: 120px;
                height: 50px;
                overflow: hidden;
            }

            .site-logo {
                height: 160px;
                margin-top: -45px;
                margin-left: -40px;
            }

            .nav-container {
                width: 100%;
                gap: 4px;
                justify-content: space-between;
                margin: 4px 0 0;
            }

            .nav-item,
            .project-item {
                padding: 6px 4px;
                font-size: 12px;
            }

            .project-dropdown {
                left: 0;
                min-width: 160px;
                transform: none;
            }

            .ad-cover-container {
                margin: 12px auto;
                padding: 0 16px;
            }

            .ad-works-grid {
                grid-template-columns: minmax(0, 1fr);
                gap: 32px;
                padding: 16px;
            }

            .loading,
            .error {
                margin: 24px 16px;
            }

            .footer {
                padding: 30px 24px;
            }

            .footer-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 24px;
            }

            .footer-left {
                grid-template-columns: max-content minmax(0, 1fr);
                width: 100%;
            }

            .footer-left span:nth-child(even) {
                overflow-wrap: anywhere;
            }

            .footer-right {
                gap: 20px;
            }

            .footer-right a {
                margin-left: 0;
            }
        }
    </style>

    <script>
        // 搜索功能
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');
        
        if (searchBtn && searchInput) {
            searchBtn.addEventListener('click', () => {
                const searchTerm = searchInput.value.trim();
                if (searchTerm) {
                    window.location.href = `search-results.html?q=${encodeURIComponent(searchTerm)}`;
                }
            });
            
            // 回车键触发搜索
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    searchBtn.click();
                }
            });
        }

        // 使用GitHub Git Trees API获取仓库结构
        async function fetchRepoStructure(owner, repo, token) {
            try {
                // 直接使用默认分支"main"
                const defaultBranch = 'main';

                // 使用Git Trees API获取完整仓库结构
                const treeUrl = `https://api.github.com/repos/${owner}/${repo}/git/trees/${defaultBranch}?recursive=1`;
                const treeResponse = await fetch(treeUrl, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!treeResponse.ok) {
                    const errorText = await treeResponse.text();
                    throw new Error(`获取仓库结构失败: ${treeResponse.status} ${treeResponse.statusText} - ${errorText}`);
                }

                const treeData = await treeResponse.json();
                return treeData;
            } catch (error) {
                console.error('获取仓库结构时出错:', error);
                throw error;
            }
        }

        // 获取文本文件内容
        async function fetchTextFile(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`获取文件失败: ${response.status} ${response.statusText}`);
                }
                return await response.text();
            } catch (error) {
                console.error('获取文本文件时出错:', error);
                return '';
            }
        }

        // 创建作品矩阵
        async function createWorksMatrix(works) {
            const container = document.createElement('div');
            container.className = 'ad-works-grid';

            for (const work of works) {
                const workItem = document.createElement('div');
                workItem.className = 'ad-work-item';

                // 创建图片容器
                const imageContainer = document.createElement('div');
                imageContainer.className = 'ad-work-image';

                // 创建图片元素
                const image = document.createElement('img');
                
                // 添加调试信息，显示当前处理的作品
                console.log('正在处理作品:', work.folder, '标题:', work.title, '图片URL:', work.coverCompressUrl);

                if (work.coverCompressUrl) {
                    // 直接使用原始封面图片
                    image.src = work.coverCompressUrl;
                    image.alt = work.title;
                    image.onload = () => {
                        image.style.opacity = '1';
                    };
                    
                    // 图片加载失败时的处理函数，修复重试计数逻辑
                    let retryCount = 0;
                    const maxRetries = 2;
                    const originalImageUrl = work.coverCompressUrl;
                    
                    image.onerror = () => {
                        console.error(`图片加载失败 (${retryCount + 1}/${maxRetries}):`, originalImageUrl);
                        
                        if (retryCount < maxRetries) {
                            // 还有重试次数，继续重试
                            retryCount++;
                            setTimeout(() => {
                                image.src = originalImageUrl;
                            }, 500 * retryCount); // 指数退避重试
                        } else {
                            // 重试次数用完，使用占位图
                            console.log('图片多次加载失败，使用占位图');
                            image.src = 'img_not_found.png';
                            image.style.opacity = '1';
                        }
                    };
                    
                    // 默认隐藏，加载完成后显示
                    image.style.opacity = '0';
                } else {
                    // 使用用户上传的img_not_found.png作为占位图
                    image.src = 'img_not_found.png';
                    image.alt = '没有找到图片';
                }

                imageContainer.appendChild(image);

                // 添加点击事件，跳转到作品详情页
                imageContainer.addEventListener('click', () => {
                    // 编码文件夹路径作为URL参数
                    const encodedFolder = encodeURIComponent(work.folder);
                    window.location.href = `ad-work-detail.html?folder=${encodedFolder}`;
                });

                // 创建标题和描述容器，与图片宽度一致
                const textContainer = document.createElement('div');
                textContainer.className = 'ad-work-text';

                const title = document.createElement('div');
                title.textContent = work.title;
                title.className = 'ad-work-title';
                
                // 添加点击事件，跳转到作品详情页
                title.addEventListener('click', () => {
                    // 编码文件夹路径作为URL参数
                    const encodedFolder = encodeURIComponent(work.folder);
                    window.location.href = `ad-work-detail.html?folder=${encodedFolder}`;
                });

                const description = document.createElement('div');
                description.textContent = work.description;
                description.className = 'ad-work-description';

                textContainer.appendChild(title);
                textContainer.appendChild(description);

                // 将所有元素添加到作品项中
                workItem.appendChild(imageContainer);
                workItem.appendChild(textContainer);

                // 添加到容器中
                container.appendChild(workItem);
            }

            return container;
        }

        // 示例用法
        // 在页面加载时自动获取仓库结构
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const loadingElement = document.getElementById('loading');
                const errorElement = document.getElementById('error');
                const coverImage = document.getElementById('coverImage');
                
                // 显示加载状态
                loadingElement.style.display = 'block';
                errorElement.textContent = '';
                
                // GitHub API相关信息
                const owner = 'anim8n';
                const repo = 'portfolio';
                const token = getGitHubToken();
                
                // 获取仓库结构 - 开发环境下禁用缓存以便调试
                const CACHE_KEY = 'ad_repo_data';
                const CACHE_EXPIRY = 60 * 60 * 1000; // 1小时过期
                
                let repoData;
                // 开发环境下禁用缓存
                // const cachedData = localStorage.getItem(CACHE_KEY);
                // 
                // if (cachedData) {
                //     const { data, timestamp } = JSON.parse(cachedData);
                //     if (Date.now() - timestamp < CACHE_EXPIRY) {
                //         console.log('使用缓存的仓库结构数据');
                //         repoData = data;
                //     }
                // }
                
                if (!repoData) {
                    console.log('从GitHub API获取仓库结构数据');
                    repoData = await fetchRepoStructure(owner, repo, token);
                    // 缓存数据
                    localStorage.setItem(CACHE_KEY, JSON.stringify({
                        data: repoData,
                        timestamp: Date.now()
                    }));
                }
                
                // 提取AD文件夹下的所有子文件夹
                const adFolder = repoData.tree.find(item => item.path === 'AD' && item.type === 'tree');
                if (!adFolder) {
                    throw new Error('未找到AD文件夹');
                }
                
                // 提取所有作品子文件夹
                const adSubfolders = repoData.tree
                    .filter(item => item.path.startsWith('AD/') && item.path.split('/').length === 2 && item.type === 'tree')
                    .map(item => item.path);
                
                // 按文件夹名中的数字顺序进行排序
                adSubfolders.sort((a, b) => {
                    // 提取数字部分，支持1.xx, 2.xx这样的格式
                    const numA = parseInt(a.match(/\d+/)[0]);
                    const numB = parseInt(b.match(/\d+/)[0]);
                    return numA - numB;
                });
                
                console.log('排序后的作品子文件夹:', adSubfolders);
                console.log('作品总数:', adSubfolders.length);
                
                // 获取每个作品的信息
                const works = await Promise.all(adSubfolders.map(async (folder) => {
                    const work = {
                        folder: folder,
                        title: '',
                        description: '',
                        coverCompressUrl: null
                    };
                    
                    // 查找title.txt
                    const titleFile = repoData.tree.find(item => item.path === `${folder}/title.txt` && item.type === 'blob');
                    if (titleFile) {
                        const titleUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/${folder}/title.txt`;
                        work.title = await fetchTextFile(titleUrl);
                    }
                    
                    // 查找description.txt
                    const descFile = repoData.tree.find(item => item.path === `${folder}/description.txt` && item.type === 'blob');
                    if (descFile) {
                        const descUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/${folder}/description.txt`;
                        work.description = await fetchTextFile(descUrl);
                    }
                    
                    // 查找所有图片文件
                    const imageFiles = repoData.tree.filter(item => 
                        item.path.startsWith(`${folder}/`) && 
                        item.type === 'blob' && 
                        (item.path.endsWith('.jpg') || item.path.endsWith('.jpeg') || item.path.endsWith('.png') || item.path.endsWith('.jfif'))
                    );
                    
                    const originalImageFiles = imageFiles.filter(item => 
                        !item.path.toLowerCase().includes('_compress')
                    );
                    
                    console.log(`文件夹 ${folder} 中的图片文件:`, imageFiles);
                    
                    // 优先使用原始封面图片，避免读取压缩版本
                    const coverKeywords = [
                        '封面', 'cover',
                        'thumbnail', 'thumb', 'thumbnails',
                        'preview', 'pre',
                        'main', 'main_image',
                        '缩略图', '预览图', '主图'
                    ];
                    const imageExtensions = ['.jpg', '.jpeg', '.png', '.jfif'];
                    
                    // 第一步：优先选择不包含_compress的封面相关图片
                    let coverImage = originalImageFiles.find(item => {
                        const lowerPath = item.path.toLowerCase();
                        return coverKeywords.some(keyword => 
                                   lowerPath.includes(keyword.toLowerCase())
                               ) &&
                               imageExtensions.some(ext => lowerPath.endsWith(ext));
                    });
                    
                    // 如果没有找到特定命名的原始封面图片，选择文件夹中的第一张原始图片
                    if (!coverImage && originalImageFiles.length > 0) {
                        coverImage = originalImageFiles[0];
                        console.log(`文件夹 ${folder} 中未找到特定命名的封面图片，使用第一张图片:`, coverImage.path);
                    }
                    
                    // 输出找到的封面图片信息
                    if (coverImage) {
                        console.log(`文件夹 ${folder} 中找到封面图片:`, coverImage.path);
                    } else {
                        console.log(`文件夹 ${folder} 中未找到任何图片`);
                    }
                    
                    // 设置图片URL，确保路径正确编码
                    if (coverImage) {
                        // 构建完整的图片URL并进行编码
                        const imagePath = coverImage.path;
                        // 确保URL路径部分正确编码
                        const encodedPath = imagePath.split('/').map(encodeURIComponent).join('/');
                        work.coverCompressUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/${encodedPath}`;
                        console.log(`为作品 ${folder} 设置图片URL:`, work.coverCompressUrl);
                    }
                    
                    return work;
                }));
                
                console.log('最终作品列表:', works);
                
                // 直接使用raw.githubusercontent.com URL获取封面图
                const coverImageUrl = `https://raw.githubusercontent.com/anim8n/portfolio/main/AD/封面.png`;
                
                // 获取封面图
                const coverResponse = await fetch(coverImageUrl);
                
                if (coverResponse.ok) {
                    // 将图片转换为Data URL并显示
                    const blob = await coverResponse.blob();
                    const imageUrl = URL.createObjectURL(blob);
                    coverImage.src = imageUrl;
                    coverImage.style.display = 'block';
                } else {
                    errorElement.textContent = `获取封面图失败: ${coverResponse.status} ${coverResponse.statusText}`;
                }
                
                // 创建作品矩阵
                const worksMatrix = await createWorksMatrix(works);
                document.querySelector('.container').appendChild(worksMatrix);
            } catch (error) {
                console.error('获取数据时出错:', error);
                document.getElementById('error').textContent = `获取数据失败: ${error.message}`;
            } finally {
                // 隐藏加载状态
                document.getElementById('loading').style.display = 'none';
            }
        });
    </script>
</body>
</html>
